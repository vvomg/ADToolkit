# credential_types.yml
# Ресурс AWX: Пользовательские типы учётных данных для IVA Mail
# Применяется через: awx.awx.credential_type
#
# Типы:
#   - IVA Mail CMD  — CMD-протокол IVA Mail (порт 106)
#   - PostgreSQL Admin — административный доступ к PostgreSQL (10.3.6.128)
#
# Машинные учётные данные (SSH) используют встроенный тип AWX "Machine".

---

# ---------------------------------------------------------------------------
# Тип 1: CMD-протокол IVA Mail (порт 106)
# Используется для управления почтовым кластером через CMD API
# ---------------------------------------------------------------------------
- name: "IVA Mail CMD"
  description: "Учётные данные для CMD-протокола IVA Mail (порт 106)"
  kind: cloud
  inputs:
    fields:
      - id: cmd_user
        type: string
        label: "CMD User"
      - id: cmd_password
        type: string
        label: "CMD Password"
        secret: true
    required:
      - cmd_user
      - cmd_password
  injectors:
    env:
      IVAMAIL_CMD_USER: "{{ cmd_user }}"
      IVAMAIL_CMD_PASSWORD: "{{ cmd_password }}"

# ---------------------------------------------------------------------------
# Тип 2: Административный доступ PostgreSQL
# Используется для инициализации кластерной БД на 10.3.6.128
# ---------------------------------------------------------------------------
- name: "PostgreSQL Admin"
  description: "Административный доступ к PostgreSQL для развёртывания IVA Mail"
  kind: cloud
  inputs:
    fields:
      - id: pg_admin_user
        type: string
        label: "PostgreSQL Admin User"
      - id: pg_admin_password
        type: string
        label: "PostgreSQL Admin Password"
        secret: true
    required:
      - pg_admin_user
      - pg_admin_password
  injectors:
    env:
      PG_ADMIN_USER: "{{ pg_admin_user }}"
      PG_ADMIN_PASSWORD: "{{ pg_admin_password }}"
