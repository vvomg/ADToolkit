# credentials_template.yml
# ВАЖНО: Реальные значения вводятся только в AWX UI. Этот файл — шаблон структуры.
#
# Назначение: документирование структуры учётных данных для IVA Mail кластера.
# Секреты (ключи, пароли) здесь содержат ТОЛЬКО заглушки.
#
# Как создать реальные учётные данные:
#   AWX UI → Credentials → Add → выбрать тип → заполнить поля
#
# Топология кластера:
#   - HAProxy:    10.3.6.101
#   - Frontend:   10.3.6.102, 10.3.6.103
#   - Backend:    10.3.6.126, 10.3.6.127
#   - Storage:    10.3.6.128  (PostgreSQL + NFS)
#   - Monitoring: 10.3.6.108

---

# ---------------------------------------------------------------------------
# 1. Machine credential — SSH доступ ко всем узлам кластера
#    Тип: Machine (встроенный AWX)
# ---------------------------------------------------------------------------
machine_ssh:
  name: "IVA Mail SSH Key"
  description: "SSH-ключ для доступа ко всем узлам IVA Mail кластера"
  credential_type: Machine
  organization: "IVA Mail"
  inputs:
    username: FILL_IN_AWX_UI          # Системный пользователь (например: ansible)
    ssh_key_data: FILL_IN_AWX_UI      # Содержимое приватного SSH-ключа
    become_method: sudo
    become_username: root
    become_password: FILL_IN_AWX_UI   # Пароль sudo (если требуется)

# ---------------------------------------------------------------------------
# 2. IVA Mail CMD — CMD-протокол управления почтовым кластером (порт 106)
#    Тип: IVA Mail CMD (пользовательский, см. credential_types.yml)
# ---------------------------------------------------------------------------
ivamail_cmd:
  name: "IVA Mail CMD"
  description: "Учётные данные CMD-протокола IVA Mail"
  credential_type: "IVA Mail CMD"
  organization: "IVA Mail"
  inputs:
    cmd_user: FILL_IN_AWX_UI          # CMD-пользователь
    cmd_password: FILL_IN_AWX_UI      # CMD-пароль (секрет)

# ---------------------------------------------------------------------------
# 3. PostgreSQL Admin — административный доступ к БД на 10.3.6.128
#    Тип: PostgreSQL Admin (пользовательский, см. credential_types.yml)
# ---------------------------------------------------------------------------
postgres_admin:
  name: "PostgreSQL Admin"
  description: "Административный доступ к PostgreSQL на storage-узле (10.3.6.128)"
  credential_type: "PostgreSQL Admin"
  organization: "IVA Mail"
  inputs:
    pg_admin_user: FILL_IN_AWX_UI     # Пользователь PostgreSQL
    pg_admin_password: FILL_IN_AWX_UI # Пароль PostgreSQL (секрет)
