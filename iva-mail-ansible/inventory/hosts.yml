---
# =============================================================================
# СТАТИЧЕСКИЙ ИНВЕНТАРЬ — ТОЛЬКО ДЛЯ ЛОКАЛЬНОГО ТЕСТИРОВАНИЯ
# =============================================================================
# При запуске через ADToolKit хосты задаются через extra_vars (add_host).
# Плейбуки (00-bootstrap.yml, 01-postgres-nfs.yml и т.д.) используют
# Play 1 «localhost» с задачами add_host, которые строят группы динамически
# из extra_vars-переменных (backend_hosts, frontend_hosts, …).
#
# Этот файл нужен, чтобы:
#   1. Разработчик мог запустить плейбуки локально командой
#      ansible-playbook playbooks/00-bootstrap.yml -e @tests/survey_vars.yml
#   2. Ansible может валидировать инвентарь без ошибок «нет хостов».
# =============================================================================
all:
  vars:
    ansible_user: root
    # ansible_ssh_pass — задаётся через переменную окружения или extra_vars (не хранить здесь!)

  children:

    haproxy:
      hosts:
        haproxy-ext:
          ansible_host: 10.3.6.101

    frontends:
      hosts:
        fe1:
          ansible_host: 10.3.6.102
        fe2:
          ansible_host: 10.3.6.103

    backends:
      hosts:
        be1:
          ansible_host: 10.3.6.126
        be2:
          ansible_host: 10.3.6.127

    storage:
      hosts:
        nfs-pg:
          ansible_host: 10.3.6.128

    monitoring:
      hosts:
        mon1:
          ansible_host: 10.3.6.108

    # Сводная группа — используется как цель плейбуков bootstrap и deploy
    all_ivamail:
      children:
        haproxy: {}
        frontends: {}
        backends: {}
        storage: {}
        monitoring: {}
