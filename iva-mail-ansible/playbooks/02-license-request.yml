---
# =============================================================================
# 02-license-request.yml — Генерация запроса лицензии IVA Mail (Итерация 3)
# =============================================================================
# Порядок плеев:
#   Play 1 (localhost)  — строит динамический инвентарий из Survey AWX
#   Play 2 (backends)   — run_once на be1 — LicenseRequest через CMD,
#                         сохранение на контроллер, вывод в лог задания AWX
#
# AWX Credentials: IVA Mail SSH Key + IVA Mail CMD
# Запуск вне AWX:
#   ansible-playbook playbooks/02-license-request.yml \
#     -e @tests/survey_vars.yml \
#     -e IVAMAIL_CMD_USER=admin -e IVAMAIL_CMD_PASSWORD=admin
# =============================================================================

# -----------------------------------------------------------------------------
# PLAY 1: Динамический инвентарий из Survey AWX
# (дублируется из предыдущих плейбуков — каждый плейбук самодостаточен)
# -----------------------------------------------------------------------------
- name: Построить динамический инвентарий из Survey AWX
  hosts: localhost
  gather_facts: no
  tasks:

    # --- Backends ---
    - name: Добавить бэкенды в инвентарий
      ansible.builtin.add_host:
        name:         "{{ item | trim }}"
        groups:
          - backends
          - all_ivamail
        ansible_host: "{{ item | trim }}"
        ansible_user: root
      loop: >-
        {{ (backend_hosts | default('')).split(',')
           | select('match', '.+') | list }}
      when:
        - backend_hosts is defined
        - backend_hosts | length > 0
      tags: always

    # --- Frontends ---
    - name: Добавить фронтенды в инвентарий
      ansible.builtin.add_host:
        name:         "{{ item | trim }}"
        groups:
          - frontends
          - all_ivamail
        ansible_host: "{{ item | trim }}"
        ansible_user: root
      loop: >-
        {{ (frontend_hosts | default('')).split(',')
           | select('match', '.+') | list }}
      when:
        - frontend_hosts is defined
        - frontend_hosts | length > 0
      tags: always

    # --- HAProxy ---
    - name: Добавить узлы HAProxy в инвентарий
      ansible.builtin.add_host:
        name:         "{{ item | trim }}"
        groups:
          - haproxy
          - all_ivamail
        ansible_host: "{{ item | trim }}"
        ansible_user: root
      loop: >-
        {{ (haproxy_hosts | default('')).split(',')
           | select('match', '.+') | list }}
      when:
        - haproxy_hosts is defined
        - haproxy_hosts | length > 0
      tags: always

    # --- Storage (одиночный IP) ---
    - name: Добавить хост хранилища в инвентарий
      ansible.builtin.add_host:
        name:         "{{ storage_host | trim }}"
        groups:
          - storage
          - all_ivamail
        ansible_host: "{{ storage_host | trim }}"
        ansible_user: root
      when:
        - storage_host is defined
        - storage_host | length > 0
      tags: always

    # --- Monitoring (одиночный IP) ---
    - name: Добавить хост мониторинга в инвентарий
      ansible.builtin.add_host:
        name:         "{{ monitoring_host | trim }}"
        groups:
          - monitoring
          - all_ivamail
        ansible_host: "{{ monitoring_host | trim }}"
        ansible_user: root
      when:
        - monitoring_host is defined
        - monitoring_host | length > 0
      tags: always

# -----------------------------------------------------------------------------
# PLAY 2: Генерация запроса лицензии (run_once на be1)
# -----------------------------------------------------------------------------
# run_once: true — задачи выполняются ровно на одном хосте группы (be1).
# Роль ivamail_license с action=request:
#   1. Запускает cmd_client.py на контроллере (delegate_to: localhost)
#   2. Сохраняет тело запроса в /opt/ivamail/license_requests/ на контроллере
#   3. Выводит содержимое запроса в лог задания AWX для передачи вендору
#
# gather_facts: yes — роль использует ansible_date_time.epoch для имени файла.
# -----------------------------------------------------------------------------
- name: Сгенерировать запрос лицензии IVA Mail (run_once на be1)
  hosts: backends
  gather_facts: yes
  run_once: true   # выполняем только на первом хосте группы (be1)

  pre_tasks:
    - name: Создать каталог для запросов лицензий на контроллере AWX
      # Каталог должен существовать до записи файла запроса ролью.
      # mode 0700 — только пользователь AWX имеет доступ к файлам лицензий.
      ansible.builtin.file:
        path:  "/opt/ivamail/license_requests"
        state: directory
        mode:  '0700'
      delegate_to: localhost
      run_once: true
      tags:
        - ivamail_license
        - license_request

  roles:
    - role: ivamail_license
      vars:
        ivamail_license_action: request
      tags: ivamail_license

  post_tasks:
    - name: Инструкция для администратора
      # Выводим чёткий следующий шаг, чтобы администратор не пропустил
      # передачу файла запроса вендору и загрузку ответного файла лицензии.
      ansible.builtin.debug:
        msg: |
          СЛЕДУЮЩИЙ ШАГ:
          1. Скачайте файл запроса из /opt/ivamail/license_requests/ на контроллере AWX
          2. Отправьте его вендору IVA Mail для получения лицензии
          3. Сохраните полученный файл лицензии (.txt) на контроллере AWX
          4. Нажмите Approve в AWX Workflow для продолжения
      run_once: true
      tags:
        - ivamail_license
        - license_request
