---
# =============================================================================
# 00-bootstrap.yml — Подготовка базового окружения на всех узлах кластера
# =============================================================================
# Порядок плеев:
#   Play 1 (localhost)    — строит динамический инвентарь из extra_vars-переменных
#   Play 2 (all_ivamail)  — применяет роль bootstrap ко всем узлам
#
# Запуск напрямую (для тестирования):
#   ansible-playbook playbooks/00-bootstrap.yml -e @tests/survey_vars.yml
# =============================================================================

# -----------------------------------------------------------------------------
# PLAY 1: Динамический инвентарь из extra_vars
# -----------------------------------------------------------------------------
# ПАТТЕРН: Ansible передаёт хосты через extra_vars-переменные (строки с разделителем
# «,»). Стандартный статический инвентарь здесь не используется — хосты
# добавляются задачами add_host, чтобы плейбук работал с любой конфигурацией
# кластера без редактирования файлов.
# -----------------------------------------------------------------------------
- name: Построить динамический инвентарь из extra_vars
  hosts: localhost
  gather_facts: no
  tasks:

    # --- Backends ---
    - name: Добавить бэкенды в инвентарий
      ansible.builtin.add_host:
        name:         "{{ item | trim }}"
        groups:
          - backends
          - all_ivamail
        ansible_host: "{{ item | trim }}"
        ansible_user: root
      loop: >-
        {{ (backend_hosts | default('')).split(',')
           | select('match', '.+') | list }}
      when:
        - backend_hosts is defined
        - backend_hosts | length > 0
      tags: always

    # --- Frontends ---
    - name: Добавить фронтенды в инвентарий
      ansible.builtin.add_host:
        name:         "{{ item | trim }}"
        groups:
          - frontends
          - all_ivamail
        ansible_host: "{{ item | trim }}"
        ansible_user: root
      loop: >-
        {{ (frontend_hosts | default('')).split(',')
           | select('match', '.+') | list }}
      when:
        - frontend_hosts is defined
        - frontend_hosts | length > 0
      tags: always

    # --- HAProxy ---
    - name: Добавить узлы HAProxy в инвентарий
      ansible.builtin.add_host:
        name:         "{{ item | trim }}"
        groups:
          - haproxy
          - all_ivamail
        ansible_host: "{{ item | trim }}"
        ansible_user: root
      loop: >-
        {{ (haproxy_hosts | default('')).split(',')
           | select('match', '.+') | list }}
      when:
        - haproxy_hosts is defined
        - haproxy_hosts | length > 0
      tags: always

    # --- Storage (одиночный IP, не список) ---
    - name: Добавить хост хранилища в инвентарий
      ansible.builtin.add_host:
        name:         "{{ storage_host | trim }}"
        groups:
          - storage
          - all_ivamail
        ansible_host: "{{ storage_host | trim }}"
        ansible_user: root
      when:
        - storage_host is defined
        - storage_host | length > 0
      tags: always

    # --- Monitoring (одиночный IP) ---
    - name: Добавить хост мониторинга в инвентарий
      ansible.builtin.add_host:
        name:         "{{ monitoring_host | trim }}"
        groups:
          - monitoring
          - all_ivamail
        ansible_host: "{{ monitoring_host | trim }}"
        ansible_user: root
      when:
        - monitoring_host is defined
        - monitoring_host | length > 0
      tags: always

# -----------------------------------------------------------------------------
# PLAY 2: Bootstrap всех узлов
# -----------------------------------------------------------------------------
# Роль bootstrap устанавливает базовые пакеты, настраивает часовой пояс,
# синхронизацию времени (chrony), sysctl и базовую безопасность SSH.
# -----------------------------------------------------------------------------
- name: Применить роль bootstrap ко всем узлам кластера
  hosts: all_ivamail
  gather_facts: yes
  roles:
    - role: bootstrap
      tags: bootstrap
