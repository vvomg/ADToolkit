---
# =============================================================================
# 07-config-dump.yml — Снимок конфигурации IVA Mail в локальный git-репозиторий
# =============================================================================
# Порядок плеев:
#   Play 1 (localhost)  — динамический инвентарий из extra_vars
#   Play 2 (backends)   — config-dump через CMD → /tmp на Ansible-контроллере
#   Play 3 (localhost)  — копирование в config-store и git commit/tag
#
# Особенности:
#   - Весь git-репозиторий хранится на Ansible-контроллере (не на monitoring)
#   - Репозиторий: /opt/ivamail-config-store (CONFIG_STORE_DIR)
#   - Структура: {ip}/module_{Name}.json, {ip}/domain_{name}.json
#   - Тег создаётся с префиксом "config-", имя задаётся через config_tag_name
#     (по умолчанию config-YYYY-MM-DD-HHMMSS)
#
# Переменные окружения: IVAMAIL_CMD_USER, IVAMAIL_CMD_PASSWORD
# Extra vars:
#   backend_hosts       — IP-адреса бэкендов через запятую
#   config_modules      — модули для дампа (опц.)
#   config_tag_name     — имя тега (опц., по умолчанию auto)
#   include_objects     — дампить объекты доменов (опц., bool, default: false)
#
# Запуск напрямую:
#   IVAMAIL_CMD_USER=admin IVAMAIL_CMD_PASSWORD=secret \
#   ansible-playbook playbooks/07-config-dump.yml \
#     -e backend_hosts=10.3.6.126,10.3.6.127
# =============================================================================

# Путь к локальному config-store репозиторию на Ansible-контроллере
- name: Инициализация переменных и проверка config-store
  hosts: localhost
  gather_facts: yes
  vars:
    _config_store_dir: "{{ config_store_dir | default('/opt/ivamail-config-store') }}"
  tasks:

    - name: Проверить что backend_hosts задан
      ansible.builtin.assert:
        that:
          - backend_hosts is defined
          - backend_hosts | length > 0
        fail_msg: >
          Переменная backend_hosts не задана.
          Укажите IP-адреса бэкендов через запятую, например: -e backend_hosts=10.3.6.126,10.3.6.127
      tags: always

    - name: Добавить бэкенды в инвентарий
      ansible.builtin.add_host:
        name:         "{{ item | trim }}"
        groups:
          - backends
          - all_ivamail
        ansible_host: "{{ item | trim }}"
        ansible_user: root
      loop: >-
        {{ (backend_hosts | default('')).split(',')
           | select('match', '.+') | list }}
      tags: always

    - name: Убедиться что config-store директория существует
      ansible.builtin.file:
        path:  "{{ _config_store_dir }}"
        state: directory
        mode:  "0750"
      tags:
        - config_dump

    - name: Инициализировать git-репозиторий в config-store (если не существует)
      ansible.builtin.command:
        cmd: git -C "{{ _config_store_dir }}" init
        creates: "{{ _config_store_dir }}/.git"
      tags:
        - config_dump

    - name: Установить git user.email для config-store (если не задан)
      ansible.builtin.command:
        cmd: git -C "{{ _config_store_dir }}" config user.email "ansible@adtoolkit"
      changed_when: false
      ignore_errors: true
      tags:
        - config_dump

    - name: Установить git user.name для config-store (если не задан)
      ansible.builtin.command:
        cmd: git -C "{{ _config_store_dir }}" config user.name "ADToolKit Ansible"
      changed_when: false
      ignore_errors: true
      tags:
        - config_dump

# -----------------------------------------------------------------------------
# PLAY 2: Снимок конфигурации бэкендов через CMD → /tmp на Ansible-контроллере
# -----------------------------------------------------------------------------
- name: Снять конфиг-дамп всех бэкендов IVA Mail через CMD
  hosts: backends
  gather_facts: no
  serial: 1   # последовательно — минимизируем нагрузку на CMD-сервер

  tasks:

    - name: Создать временный каталог дампа на Ansible-контроллере
      ansible.builtin.file:
        path: "/tmp/ivamail-dump-{{ inventory_hostname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      tags:
        - config_dump

    # ── Предварительная проверка доступности CMD-порта ───────────────────────
    - name: "Проверить доступность CMD-порта {{ ansible_host }}:{{ cmd_port | default(106) }}"
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ cmd_port | default(106) }}"
        timeout: 10
        msg: "CMD-порт {{ ansible_host }}:{{ cmd_port | default(106) }} недоступен с контроллера"
      delegate_to: localhost
      tags:
        - config_dump

    # ── Основной дамп ─────────────────────────────────────────────────────────
    - name: "Конфиг-дамп IVA Mail через CMD ({{ ansible_host }})"
      ansible.builtin.script:
        cmd: >-
          ../scripts/cmd_client.py
          --host {{ ansible_host }}
          --port {{ cmd_port | default(106) }}
          --action config-dump
          --output-dir /tmp/ivamail-dump-{{ inventory_hostname }}
          --modules {{ config_modules | default('Cluster,CMD,SMTP,IMAP,POP3,WebAccess,AntiSpam,Antivirus') }}
          --timeout {{ cmd_port_wait_timeout | default(30) }}
          {{ '--include-objects' if (include_objects | default(false) | bool) else '' }}
      environment:
        IVAMAIL_CMD_USER:     "{{ lookup('env', 'IVAMAIL_CMD_USER') }}"
        IVAMAIL_CMD_PASSWORD: "{{ lookup('env', 'IVAMAIL_CMD_PASSWORD') }}"
      delegate_to: localhost
      changed_when: true
      no_log: true
      register: _dump_result
      tags:
        - config_dump

    - name: Показать сводку дампа ({{ inventory_hostname }})
      ansible.builtin.debug:
        msg: >-
          config-dump {{ inventory_hostname }}:
          {{ _dump_result.stdout_lines | default([]) | last | default('OK') }}
      tags:
        - config_dump

# -----------------------------------------------------------------------------
# PLAY 3: Копирование JSON в config-store и git commit/tag на контроллере
# -----------------------------------------------------------------------------
- name: Сохранить снимок конфигурации в локальный git-репозиторий на контроллере
  hosts: localhost
  gather_facts: yes

  vars:
    _config_store_dir: "{{ config_store_dir | default('/opt/ivamail-config-store') }}"
    _backend_list: >-
      {{ (backend_hosts | default('')).split(',')
         | select('match', '.+') | map('trim') | list }}
    _ts: "{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}"
    _tag_name: >-
      {{ config_tag_name | default('config-' + _ts) }}

  tasks:

    - name: Создать каталоги для каждого бэкенда в config-store
      ansible.builtin.file:
        path: "{{ _config_store_dir }}/{{ item }}"
        state: directory
        mode: "0750"
      loop: "{{ _backend_list }}"
      tags:
        - config_dump

    - name: Синхронизировать JSON-дампы из /tmp в config-store
      # rsync-аналог: copy-модуль копирует содержимое каталога /tmp/ivamail-dump-{ip}/
      # в {config_store_dir}/{ip}/ на том же хосте (контроллер → контроллер)
      ansible.builtin.copy:
        src:  "/tmp/ivamail-dump-{{ item }}/"
        dest: "{{ _config_store_dir }}/{{ item }}/"
        mode: "0640"
      loop: "{{ _backend_list }}"
      register: _copy_results
      tags:
        - config_dump

    - name: Удалить временные каталоги дампа с контроллера
      ansible.builtin.file:
        path: "/tmp/ivamail-dump-{{ item }}"
        state: absent
      loop: "{{ _backend_list }}"
      tags:
        - config_dump

    - name: Git add — проиндексировать все изменения конфигурации
      ansible.builtin.command:
        cmd: git -C "{{ _config_store_dir }}" add .
      changed_when: true
      tags:
        - config_dump

    - name: Git commit снимка конфигурации (только при наличии изменений)
      ansible.builtin.shell: |
        git -C "{{ _config_store_dir }}" diff --cached --quiet || \
          git -C "{{ _config_store_dir }}" commit \
            -m "config dump {{ ansible_date_time.iso8601 }} tag={{ _tag_name }}"
      register: _git_commit
      changed_when: _git_commit.rc == 0
      tags:
        - config_dump

    - name: "Создать git-тег снимка конфигурации: {{ _tag_name }}"
      ansible.builtin.command:
        cmd: git -C "{{ _config_store_dir }}" tag "{{ _tag_name }}"
      register: _git_tag_result
      changed_when: _git_tag_result.rc == 0
      failed_when: false   # тег с таким именем может уже существовать
      tags:
        - config_dump

    - name: Показать доступные теги конфигурации
      ansible.builtin.command:
        cmd: git -C "{{ _config_store_dir }}" tag --list "config-*" --sort=-creatordate
      register: _git_tags
      changed_when: false
      tags:
        - config_dump

    - name: Сводка — список тегов конфигурации
      ansible.builtin.debug:
        msg: |
          Снимок конфигурации создан: {{ _tag_name }}
          Config-store: {{ _config_store_dir }}
          Доступные теги:
          {{ _git_tags.stdout }}
      tags:
        - config_dump
