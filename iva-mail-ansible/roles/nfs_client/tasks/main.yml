---
# tasks/main.yml — nfs_client role
# Монтирование NFS-шары на бэкендах IVA Mail.
# NFSv3 обязателен — требование IVA Mail (nfsvers=3 в опциях монтирования).

- name: Install nfs-common package
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags:
    - nfs
    - nfs_client

- name: Start and enable rpcbind
  ansible.builtin.service:
    name: rpcbind
    state: started
    enabled: true
  tags:
    - nfs
    - nfs_client

- name: Create ivamail group
  ansible.builtin.group:
    name: "{{ ivamail_group }}"
    state: present
    system: true
  tags:
    - nfs
    - nfs_client

- name: Create ivamail system user
  ansible.builtin.user:
    name: "{{ ivamail_user }}"
    group: "{{ ivamail_group }}"
    home: "{{ ivamail_data_dir }}"
    shell: /sbin/nologin
    system: true
    create_home: false
    state: present
  tags:
    - nfs
    - nfs_client

- name: Create NFS mount point {{ nfs_mount_point }}
  ansible.builtin.file:
    path: "{{ nfs_mount_point }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - nfs
    - nfs_client

# NFSv3 — обязательное требование IVA Mail.
# state: mounted — монтирует немедленно И добавляет запись в /etc/fstab.
- name: Mount NFS share via NFSv3 (IVA Mail requirement)
  ansible.posix.mount:
    src: "{{ nfs_server_ip }}:{{ nfs_export_dir }}"
    path: "{{ nfs_mount_point }}"
    fstype: nfs
    opts: "nfsvers=3,defaults"
    state: mounted
  tags:
    - nfs
    - nfs_client

- name: Create ivamail data directory {{ ivamail_data_dir }}
  ansible.builtin.file:
    path: "{{ ivamail_data_dir }}"
    state: directory
    owner: "{{ ivamail_user }}"
    group: "{{ ivamail_group }}"
    mode: '0750'
  tags:
    - nfs
    - nfs_client

- name: Check if Cluster symlink exists
  ansible.builtin.stat:
    path: "{{ ivamail_cluster_link }}"
  register: cluster_link_stat
  tags:
    - nfs
    - nfs_client

- name: Create /var/ivamail/Cluster -> {{ nfs_mount_point }} symlink
  ansible.builtin.file:
    src: "{{ nfs_mount_point }}"
    dest: "{{ ivamail_cluster_link }}"
    state: link
    force: true
    owner: "{{ ivamail_user }}"
    group: "{{ ivamail_group }}"
  tags:
    - nfs
    - nfs_client

- name: Verify NFS share is mounted (mountpoint check)
  ansible.builtin.command:
    cmd: "mountpoint -q {{ nfs_mount_point }}"
  register: nfs_mountpoint_check
  changed_when: false
  tags:
    - nfs
    - nfs_client

- name: Assert NFS share is properly mounted
  ansible.builtin.assert:
    that:
      - nfs_mountpoint_check.rc == 0
    fail_msg: "NFS mount {{ nfs_mount_point }} is not active. Check NFS server {{ nfs_server_ip }} and network connectivity."
    success_msg: "NFS mount {{ nfs_mount_point }} is active (NFSv3)"
  tags:
    - nfs
    - nfs_client
