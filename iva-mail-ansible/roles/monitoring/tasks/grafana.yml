---
# tasks/grafana.yml — установка Grafana из официального apt-репозитория
# Если репозиторий недоступен по сети, поддерживается установка через dpkg (pre-downloaded .deb)

- name: Проверить наличие исполняемого файла Grafana
  ansible.builtin.stat:
    path: /usr/sbin/grafana-server
  register: grafana_binary
  tags:
    - monitoring
    - grafana

- name: Создать каталог для ключей APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: not grafana_binary.stat.exists
  tags:
    - monitoring
    - grafana

- name: Скачать GPG-ключ Grafana
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.gpg
    mode: "0644"
    force: no
  when: not grafana_binary.stat.exists
  register: grafana_gpg_result
  failed_when: false
  tags:
    - monitoring
    - grafana

- name: Добавить официальный репозиторий Grafana
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"
    state: present
    update_cache: no
  when:
    - not grafana_binary.stat.exists
    - grafana_gpg_result.status_code is defined
    - grafana_gpg_result.status_code == 200 or (grafana_gpg_result.dest is defined and grafana_gpg_result.dest)
  failed_when: false
  tags:
    - monitoring
    - grafana

- name: Установить пакет Grafana (apt)
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: yes
  when: not grafana_binary.stat.exists
  failed_when: false
  register: grafana_apt_result
  tags:
    - monitoring
    - grafana

- name: Повторно проверить наличие Grafana после попытки apt-установки
  ansible.builtin.stat:
    path: /usr/sbin/grafana-server
  register: grafana_binary_after
  tags:
    - monitoring
    - grafana

- name: Сообщить что Grafana не установлена (apt не удался, нет pre-downloaded .deb)
  ansible.builtin.fail:
    msg: >
      Grafana не установлена. apt-install не удался, и /usr/sbin/grafana-server не найден.
      Установите Grafana вручную через dpkg перед запуском роли, либо обеспечьте доступ к apt.grafana.com.
  when: not grafana_binary_after.stat.exists
  tags:
    - monitoring
    - grafana

- name: Задать пароль администратора Grafana в grafana.ini
  ansible.builtin.ini_file:
    path: /etc/grafana/grafana.ini
    section: security
    option: admin_password
    value: "{{ grafana_admin_password }}"
    mode: "0640"
  no_log: true
  notify: restart grafana
  tags:
    - monitoring
    - grafana

- name: Принудительно установить пароль admin через grafana-cli (надёжнее ini)
  ansible.builtin.command:
    cmd: "grafana-cli admin reset-admin-password {{ grafana_admin_password }}"
  no_log: true
  register: grafana_pw_result
  failed_when:
    - grafana_pw_result.rc != 0
    - "'Admin password changed successfully' not in grafana_pw_result.stdout"
  changed_when: grafana_pw_result.rc == 0
  tags:
    - monitoring
    - grafana

- name: Включить и запустить сервис Grafana
  ansible.builtin.service:
    name: "{{ grafana_service }}"
    enabled: yes
    state: started
  tags:
    - monitoring
    - grafana

- name: Дождаться запуска Grafana на порту {{ grafana_port }}
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ grafana_port }}"
    timeout: 60
  tags:
    - monitoring
    - grafana
    - healthcheck

- name: Настроить автопровижининг Grafana (datasources + dashboards)
  ansible.builtin.include_tasks: grafana_provision.yml
  tags:
    - monitoring
    - grafana
    - provisioning
