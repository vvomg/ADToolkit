# Beads Configuration — ADToolKit
# ================================
# IVA Mail cluster deployment automation toolkit
# Issue prefix: adt (e.g. adt-a3f2dd)

issue-prefix: "adt"

auto-start-daemon: true
flush-debounce: "5s"

sync.remote: "git+https://github.com/vvomg/ADToolkit.git"

# =============================================================================
# DAEMON SETTINGS
# =============================================================================

daemon.auto-commit: true
daemon.auto-push: true
daemon.auto-pull: true

# =============================================================================
# DIRECTORY LABELS
# =============================================================================

directory-labels:
  "frontend/src/pages":       ["frontend", "pages"]
  "frontend/src/components":  ["frontend", "components"]
  "frontend/src":             ["frontend"]
  "backend/api":              ["backend", "api"]
  "backend/services":         ["backend", "services"]
  "backend/models":           ["backend", "models"]
  "backend/infrastructure":   ["backend", "infra"]
  "backend":                  ["backend"]
  "iva-mail-ansible/roles":   ["ansible", "roles"]
  "iva-mail-ansible":         ["ansible"]
  "deploy":                   ["deploy"]
  "docs":                     ["documentation"]
  ".claude":                  ["agent", "config"]

# =============================================================================
# EXCLUSIVE LOCK PROTOCOL
# =============================================================================

exclusive-lock:
  enabled: true
  timeout: "30m"
  lock-file: ".beads/locks.json"
  on-conflict: "warn"

# =============================================================================
# PROTECTED BRANCHES
# =============================================================================

protected-branches:
  enabled: true
  production: "master"
  development: "master"

# =============================================================================
# PATROLS
# =============================================================================

patrols:
  code-review:
    description: "Code review after major implementation"
    formula: "codereview"
    trigger: "on_demand"

  health-check:
    description: "Codebase health check"
    formula: "healthcheck"
    trigger: "on_demand"
